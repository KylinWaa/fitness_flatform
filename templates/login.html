{% extends "base.html" %}
{% block title %}登录 - 健身打卡{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="logo-icon"><i class="fas fa-dumbbell"></i></div>
            <h2>锻体！！！</h2>
            <p>薄肌还是肌薄？</p>
        </div>
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label><i class="fas fa-user"></i></label>
                <input type="text" name="username" placeholder="用户名" required autocomplete="username">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i></label>
                <input type="password" name="password" placeholder="密码" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary btn-block">登 录</button>
        </form>
        <div class="auth-link">
            还没有账号？<a href="{{ url_for('register') }}">立即注册</a>
        </div>
    </div>
</div>
{% endblock %}
